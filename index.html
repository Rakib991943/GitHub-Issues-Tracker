  <main id="mainContainer" class="w-11/12 mx-auto" >
  

    <!-- Tabs -->
    <div class="shadow-2xl rounded-2xl">
      <div class="flex gap-5 py-4 px-3 mt-7  rounded-md  mb-6">
        <button class="px-4 py-2  btn-outline btn-primary  btn font-semibold rounded-l-md">All</button>
        <button class="px-4 py-2  btn-outline btn-primary  btn  font-semibold">Open</button>
        <button class="px-4 py-2  btn-outline btn-primary btn  font-semibold ">Closed</button>
    </div>
    </div>

    <!-- Issue Card -->
    <div class="shadow-2xl">
      <div class="flex items-center justify-between  bg-white shadow-md rounded-lg p-4 ">
        <!-- Icon -->
        <div class="text-purple-500 text-2xl mr-4">
            <i class="fas fa-exclamation-circle"></i>
        </div>

        <!-- Text Content -->
        <div class="flex-1">
            <h3 class="font-bold text-lg">50 Issues</h3>
            <p class="text-gray-500 text-sm">Track and manage your project issues</p>
        </div>

        <!-- Status -->
        <div class="flex items-cente text-sm gap-3 ">
            <div class="flex items-center mb-1">
                <span class="w-2 h-2 bg-green-500 rounded-full mr-2"></span>Open
            </div>
            <div class="flex items-center ">
                <span class="w-2 h-2 bg-purple-500 rounded-full mr-2"></span>Closed
            </div>
        </div>
    </div>
    </div>


<!-- Loading Spinner  -->

<div class=" flex justify-center items-center hidden" id="spinnerLoading">

  <span class="loading loading-bars loading-xl mt-5 mb-3"></span>
</div>


    <!-- Card Contianer  -->


    <div id="CardContainer" class="grid lg:grid-cols-4 gap-4">

     

   
  

    </div>
